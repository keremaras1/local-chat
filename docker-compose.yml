services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: localchat
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: localchat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Overrides .env — ensures the app always finds the db container by name.
      DATABASE_URL: postgresql+asyncpg://localchat:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/localchat
    extra_hosts:
      # Makes host.docker.internal resolve to the host on Linux (and the Pi).
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
